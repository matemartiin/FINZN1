<!DOCTYPE html>
<html>
<head>
    <title>Calendar Debug</title>
</head>
<body>
    <script>
        // Debug script to check DOM elements
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== CALENDAR MODAL DEBUG ===');
            
            // Check if elements exist
            const addEventBtn = document.getElementById('add-event-btn');
            const addEventModal = document.getElementById('add-event-modal');
            const addEventForm = document.getElementById('add-event-form');
            const calendarSection = document.getElementById('calendar-section');
            
            console.log('Elements found:');
            console.log('- add-event-btn:', !!addEventBtn, addEventBtn);
            console.log('- add-event-modal:', !!addEventModal, addEventModal);
            console.log('- add-event-form:', !!addEventForm, addEventForm);
            console.log('- calendar-section:', !!calendarSection, calendarSection);
            
            // Check modal classes
            const allModals = document.querySelectorAll('.modal');
            console.log('All modals found:', allModals.length);
            allModals.forEach((modal, index) => {
                console.log(`Modal ${index}:`, modal.id, modal.className);
            });
            
            // Check if ModalManager is initialized
            console.log('window.app:', !!window.app);
            console.log('window.app.modals:', !!window.app?.modals);
            
            // Try to trigger modal manually
            if (addEventBtn) {
                addEventBtn.addEventListener('click', function() {
                    console.log('Add event button clicked!');
                    if (window.app?.modals) {
                        console.log('Trying to show modal...');
                        window.app.modals.show('add-event-modal');
                    } else {
                        console.error('ModalManager not available!');
                    }
                });
            }
        });
    </script>
</body>
</html>
